name: Deploy Dockge Stack

on:
  workflow_dispatch:

concurrency:
  group: deploy-danielagomez-es
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to docker-compose (Dockge host)
    runs-on:
      - self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync deployment files and authored Ghost theme
        env:
          STACK_DIR: /opt/stacks/danielagomez-es
        run: |
          set -euo pipefail

          mkdir -p "$STACK_DIR"

          # Update deployment files, but keep the host-owned .env untouched.
          rsync -a \
            "$GITHUB_WORKSPACE/docker-compose.yml" \
            "$GITHUB_WORKSPACE/.env.example" \
            "$STACK_DIR/"

          # Update the authored theme and routes without touching Ghost's
          # runtime data, uploaded images, logs, or other installed themes.
          mkdir -p \
            "$STACK_DIR/ghost/content/themes/transfolio" \
            "$STACK_DIR/ghost/content/settings"

          rsync -a --delete \
            "$GITHUB_WORKSPACE/ghost/content/themes/transfolio/" \
            "$STACK_DIR/ghost/content/themes/transfolio/"

          rsync -a \
            "$GITHUB_WORKSPACE/ghost/content/settings/routes.yaml" \
            "$STACK_DIR/ghost/content/settings/routes.yaml"

          # Seed .env once if it does not exist yet.
          if [ ! -f "$STACK_DIR/.env" ] && [ -f "$STACK_DIR/.env.example" ]; then
            cp "$STACK_DIR/.env.example" "$STACK_DIR/.env"
          fi

      - name: Pull image and redeploy stack
        env:
          STACK_DIR: /opt/stacks/danielagomez-es
        run: |
          set -euo pipefail
          cd "$STACK_DIR"
          docker compose pull
          docker compose up -d --remove-orphans
